id: android-app
name: Android App
description: A minimal Kotlin Android app — Gradle build, an :app module, and a ConstraintLayout screen. Needs the Android SDK prerequisites to build.
requires:
  - android-prereqs
  - android-sdk
inputs:
  - id: minSdk
    label: Minimum SDK
    type: select
    options: ["21", "23", "24", "26", "28", "29", "30", "31", "33", "34"]
    default: "24"
  - id: targetSdk
    label: Target / Compile SDK
    type: select
    options: ["30", "31", "33", "34", "35"]
    default: "34"
recipe:
  - label: Create project layout
    run: |
      mkdir -p "{{projectDir}}/app/src/main/java/com/example/{{name}}"
      mkdir -p "{{projectDir}}/app/src/main/res/layout"
      mkdir -p "{{projectDir}}/app/src/main/res/values"
      mkdir -p "{{projectDir}}/.jcode"

  - label: Write settings.gradle.kts
    run: |
      cat > "{{projectDir}}/settings.gradle.kts" <<'EOF'
      pluginManagement {
          repositories {
              google()
              mavenCentral()
              gradlePluginPortal()
          }
      }
      dependencyResolutionManagement {
          repositories {
              google()
              mavenCentral()
          }
      }

      rootProject.name = "{{name}}"
      include(":app")
      EOF

  - label: Write root build.gradle.kts
    run: |
      cat > "{{projectDir}}/build.gradle.kts" <<'EOF'
      plugins {
          id("com.android.application") version "8.5.0" apply false
          id("org.jetbrains.kotlin.android") version "1.9.24" apply false
      }
      EOF

  - label: Write gradle.properties
    run: |
      cat > "{{projectDir}}/gradle.properties" <<EOF
      org.gradle.jvmargs=-Xmx2560m -Dfile.encoding=UTF-8
      android.useAndroidX=true
      kotlin.code.style=official
      # Use the distro's ARM-native aapt2 (Google ships only x86_64 in build-tools).
      android.aapt2FromMavenOverride=$HOME/android-sdk/build-tools/34.0.0/aapt2
      android.suppressUnsupportedCompileSdk={{targetSdk}}
      EOF

  - label: Write app/build.gradle.kts
    run: |
      cat > "{{projectDir}}/app/build.gradle.kts" <<'EOF'
      plugins {
          id("com.android.application")
          id("org.jetbrains.kotlin.android")
      }

      android {
          namespace = "com.example.{{name}}"
          compileSdk = {{targetSdk}}

          defaultConfig {
              applicationId = "com.example.{{name}}"
              minSdk = {{minSdk}}
              targetSdk = {{targetSdk}}
              versionCode = 1
              versionName = "1.0"
          }

          buildTypes {
              release {
                  isMinifyEnabled = false
              }
          }

          compileOptions {
              sourceCompatibility = JavaVersion.VERSION_17
              targetCompatibility = JavaVersion.VERSION_17
          }

          kotlinOptions {
              jvmTarget = "17"
          }
      }

      dependencies {
          implementation("androidx.core:core-ktx:1.13.1")
          implementation("androidx.appcompat:appcompat:1.7.0")
          implementation("com.google.android.material:material:1.12.0")
          implementation("androidx.constraintlayout:constraintlayout:2.1.4")
      }
      EOF

  - label: Write AndroidManifest.xml
    run: |
      cat > "{{projectDir}}/app/src/main/AndroidManifest.xml" <<'EOF'
      <?xml version="1.0" encoding="utf-8"?>
      <manifest xmlns:android="http://schemas.android.com/apk/res/android">

          <application
              android:allowBackup="true"
              android:label="@string/app_name"
              android:supportsRtl="true"
              android:theme="@style/Theme.Material3.DayNight">
              <activity
                  android:name=".MainActivity"
                  android:exported="true">
                  <intent-filter>
                      <action android:name="android.intent.action.MAIN" />
                      <category android:name="android.intent.category.LAUNCHER" />
                  </intent-filter>
              </activity>
          </application>

      </manifest>
      EOF

  - label: Write MainActivity.kt
    run: |
      cat > "{{projectDir}}/app/src/main/java/com/example/{{name}}/MainActivity.kt" <<'EOF'
      package com.example.{{name}}

      import android.os.Bundle
      import androidx.appcompat.app.AppCompatActivity

      class MainActivity : AppCompatActivity() {
          override fun onCreate(savedInstanceState: Bundle?) {
              super.onCreate(savedInstanceState)
              setContentView(R.layout.activity_main)
          }
      }
      EOF

  - label: Write res/layout/activity_main.xml
    run: |
      cat > "{{projectDir}}/app/src/main/res/layout/activity_main.xml" <<'EOF'
      <?xml version="1.0" encoding="utf-8"?>
      <androidx.constraintlayout.widget.ConstraintLayout
          xmlns:android="http://schemas.android.com/apk/res/android"
          xmlns:app="http://schemas.android.com/apk/res-auto"
          android:layout_width="match_parent"
          android:layout_height="match_parent">

          <TextView
              android:id="@+id/message"
              android:layout_width="wrap_content"
              android:layout_height="wrap_content"
              android:text="Hello, Android!"
              android:textSize="20sp"
              app:layout_constraintBottom_toBottomOf="parent"
              app:layout_constraintEnd_toEndOf="parent"
              app:layout_constraintStart_toStartOf="parent"
              app:layout_constraintTop_toTopOf="parent" />

      </androidx.constraintlayout.widget.ConstraintLayout>
      EOF

  - label: Write res/values/strings.xml
    run: |
      cat > "{{projectDir}}/app/src/main/res/values/strings.xml" <<'EOF'
      <?xml version="1.0" encoding="utf-8"?>
      <resources>
          <string name="app_name">{{name}}</string>
      </resources>
      EOF

  - label: Configure Build & Run
    run: |
      cat > "{{projectDir}}/.jcode/run.yaml" <<'EOF'
      version: 1
      name: Android app
      terminals:
        - label: Build APK
          command: |
            clear
            set -e
            export JAVA_HOME="$(dirname "$(dirname "$(readlink -f "$(command -v javac)")")")"
            export ANDROID_HOME="$HOME/android-sdk" ANDROID_SDK_ROOT="$HOME/android-sdk"
            export PATH="/opt/gradle/gradle-8.7/bin:$JAVA_HOME/bin:$PATH"
            SRC="{{projectDir}}"
            STAGE="$HOME/.jcode-run/{{name}}-android"
            echo '== J Code: Build APK (assembleDebug) =='
            echo 'Needs the Android SDK prerequisites + Android SDK from the SDK Manager.'
            # /workspace is FUSE (no symlinks); Gradle builds on the ext4 home, then the APK is copied back.
            echo '[1/3] Staging project to ext4 home...'
            rm -rf "$STAGE" && mkdir -p "$STAGE" && cp -a "$SRC/." "$STAGE/"
            cd "$STAGE"
            echo "sdk.dir=$ANDROID_HOME" > local.properties
            echo '[2/3] Building (gradle :app:assembleDebug)...'
            gradle --no-daemon --console=plain :app:assembleDebug
            echo '[3/3] Copying APK back into the project (build-output/)...'
            APK="$(ls "$STAGE"/app/build/outputs/apk/debug/*.apk | head -1)"
            mkdir -p "$SRC/build-output" && cp -f "$APK" "$SRC/build-output/"
            echo "APK ready: build-output/$(basename "$APK")"
      EOF
